[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.setuptools", "ffmpeg"]

[phases.install]
cmds = ["python3 -m pip install -r requirements.txt"]

[phases.build]
cmds = ["python3 manage.py collectstatic --noinput --clear"]

[start]
cmd = "python3 -m gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
